<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }
        
        .container {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease;
        }
        
        h2 {
            text-align: center;
        }
        
        input,
        select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #007bff;
        }
        
        .error {
            color: red;
            font-size: 14px;
        }
        
        .success-box {
            margin-top: 20px;
            padding: 15px;
            background: #e0ffe0;
            border-radius: 10px;
            display: none;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Student Portal</h2>

        <form id="studentForm">
            <h3>Personal Info</h3>
            <input type="text" id="name" placeholder="Full Name">
            <div class="error" id="nameError"></div>

            <input type="email" id="email" placeholder="Email">
            <div class="error" id="emailError"></div>

            <input type="text" id="phone" placeholder="Phone Number">
            <div class="error" id="phoneError"></div>

            <h3>Academic Info</h3>
            <input type="text" id="course" placeholder="Course">
            <div class="error" id="courseError"></div>

            <input type="number" id="marks" placeholder="Marks (%)">
            <div class="error" id="marksError"></div>

            <button type="submit">Submit</button>
        </form>

        <div class="success-box" id="resultBox"></div>
    </div>

    <script>
        document.getElementById("studentForm").addEventListener("submit", function(e) {
            e.preventDefault();

            let isValid = true;

            // Clear errors
            document.querySelectorAll(".error").forEach(el => el.innerText = "");

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let course = document.getElementById("course").value.trim();
            let marks = document.getElementById("marks").value.trim();

            // Validation
            if (name === "") {
                document.getElementById("nameError").innerText = "Name required";
                isValid = false;
            }

            if (!email.includes("@")) {
                document.getElementById("emailError").innerText = "Valid email required";
                isValid = false;
            }

            if (phone.length < 10) {
                document.getElementById("phoneError").innerText = "Enter valid phone";
                isValid = false;
            }

            if (course === "") {
                document.getElementById("courseError").innerText = "Course required";
                isValid = false;
            }

            if (marks === "" || marks < 0 || marks > 100) {
                document.getElementById("marksError").innerText = "Marks must be 0-100";
                isValid = false;
            }

            if (isValid) {
                let resultBox = document.getElementById("resultBox");
                resultBox.style.display = "block";

                resultBox.innerHTML = `
            <h3>Student Dashboard</h3>
            <p><strong>Name:</strong> ${name}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Phone:</strong> ${phone}</p>
            <p><strong>Course:</strong> ${course}</p>
            <p><strong>Marks:</strong> ${marks}%</p>
        `;
            }
        });
    </script>

</body>

</html>
